<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>PGA Championship 2026 · Team Selection</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy-mid:#162240;--navy-light:#1e3058;
  --gold:#c9a84c;--gold-light:#f0d080;--gold-pale:#fdf6e3;
  --green:#1a6b3a;--green-bg:#e5f3ec;
  --red:#b83232;--red-bg:#fdecea;
  --text:#1c1c1c;--text-mid:#5a5a5a;--text-soft:#999;
  --border:#e2e2e2;--bg:#f5f3ee;--white:#fff;
  --radius:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hd{background:var(--navy);padding:20px 16px 0;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.hd-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.hd h1{font-family:'EB Garamond',Georgia,serif;font-size:22px;font-weight:600;color:var(--gold-light)}
.hd-sub{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:12px}

/* ── BUDGET BAR ── */
.budget-bar{background:var(--navy-mid);border-top:1px solid rgba(255,255,255,.08);padding:12px 16px}
.budget-inner{max-width:500px;margin:0 auto;display:flex;align-items:center;gap:12px}
.budget-label{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap}
.budget-track{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.budget-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .3s ease}
.budget-fill.warning{background:#e88a2e}
.budget-fill.danger{background:var(--red)}
.budget-nums{font-family:'EB Garamond',serif;font-size:18px;font-weight:600;color:var(--gold-light);white-space:nowrap;min-width:90px;text-align:right}
.budget-nums.danger{color:#ff7b7b}

/* ── PICKS STRIP ── */
.picks-strip{background:var(--navy-light);border-top:1px solid rgba(255,255,255,.06);padding:10px 16px 14px}
.picks-inner{max-width:500px;margin:0 auto}
.picks-label{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.picks-slots{display:flex;gap:6px}
.slot{flex:1;background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.15);border-radius:8px;padding:6px 4px;text-align:center;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;cursor:default}
.slot.filled{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);cursor:pointer}
.slot.filled:active{background:rgba(201,168,76,.2)}
.slot-name{font-size:9px;font-weight:600;color:var(--gold-light);line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.slot-cost{font-size:8px;color:rgba(255,255,255,.4);margin-top:2px}
.slot-empty{font-size:18px;color:rgba(255,255,255,.1)}

/* ── MAIN ── */
.main{max-width:500px;margin:0 auto;padding:14px 12px 40px}

/* ── CONTROLS ── */
.controls{display:flex;gap:8px;margin-bottom:12px}
.search-wrap{flex:1;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-soft)}
.search{width:100%;padding:9px 10px 9px 34px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);outline:none}
.search:focus{border-color:var(--navy-light)}


/* ── PLAYER LIST ── */
.player-list{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.player-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .12s;-webkit-tap-highlight-color:transparent}
.player-row:last-child{border-bottom:none}
.player-row:active{background:#f8f8f8}
.player-row.selected{background:var(--green-bg)}
.player-row.selected .player-name{color:var(--green)}
.player-row.disabled{opacity:.4;cursor:not-allowed}
.player-row.disabled:active{background:transparent}
.player-name{font-size:14px;font-weight:600;color:var(--text)}

.player-cost{font-family:'EB Garamond',Georgia,serif;font-size:20px;font-weight:600;color:var(--navy);text-align:right;min-width:52px}
.player-cost .cost-unit{font-size:11px;font-weight:400;color:var(--text-soft)}
.tick{width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tick svg{width:12px;height:12px;stroke:#fff;stroke-width:2.5;fill:none}
.add-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-soft)}
.add-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none}

/* ── SECTION HEADER ── */
.section-hd{font-size:10px;font-weight:600;color:var(--text-soft);letter-spacing:.5px;text-transform:uppercase;padding:14px 14px 6px;background:var(--white);border-bottom:1px solid #f0f0f0}

/* ── SUBMIT ── */
.submit-wrap{margin-top:16px}
.submit-btn{width:100%;padding:14px;background:var(--navy);color:var(--gold-light);font-family:'EB Garamond',Georgia,serif;font-size:18px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;letter-spacing:.3px;transition:background .15s}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.submit-btn:not(:disabled):active{background:var(--navy-mid)}
.submit-btn.ready{background:var(--green)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;font-size:13px;padding:10px 18px;border-radius:20px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-logo">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="9" stroke="#c9a84c" stroke-width="1.5"/>
      <path d="M10 4v6l4 2" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>PGA Championship 2026</h1>
  </div>
  <div class="hd-sub">Team Selection · Aronimink GC · May 14–17</div>
  <div class="budget-bar">
    <div class="budget-inner">
      <span class="budget-label">Budget</span>
      <div class="budget-track"><div class="budget-fill" id="budget-fill"></div></div>
      <div class="budget-nums" id="budget-nums">£50.0m</div>
    </div>
  </div>
  <div class="picks-strip">
    <div class="picks-inner">
      <div class="picks-label">Your picks — tap to remove</div>
      <div class="picks-slots" id="picks-slots">
        <div class="slot" id="slot-0"><span class="slot-empty">+</span></div>
        <div class="slot" id="slot-1"><span class="slot-empty">+</span></div>
        <div class="slot" id="slot-2"><span class="slot-empty">+</span></div>
        <div class="slot" id="slot-3"><span class="slot-empty">+</span></div>
        <div class="slot" id="slot-4"><span class="slot-empty">+</span></div>
      </div>
    </div>
  </div>
</header>

<main class="main">
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6" cy="6" r="4"/><path d="M10 10l2.5 2.5"/></svg>
      <input class="search" id="search" type="search" placeholder="Search players…" autocomplete="off"/>
    </div>
  </div>
  <div class="player-list" id="player-list"></div>
  <div class="submit-wrap">
    <button class="submit-btn" id="submit-btn" disabled onclick="submitTeam()">Select 5 players to continue →</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const BUDGET = 50;
const MAX_PICKS = 5;

const PLAYERS = [
  {name:'Scottie Scheffler',   odds:380,   cost:20.0},
  {name:'Rory McIlroy',        odds:650,   cost:16.0},
  {name:'Bryson DeChambeau',   odds:1000,  cost:13.5},
  {name:'Jon Rahm',            odds:1200,  cost:12.5},
  {name:'Xander Schauffele',   odds:1600,  cost:11.0},
  {name:'Tommy Fleetwood',     odds:1800,  cost:10.0},
  {name:'Ludvig Åberg',        odds:1800,  cost:10.0},
  {name:'Collin Morikawa',     odds:2200,  cost:9.5},
  {name:'Cameron Young',       odds:2200,  cost:9.5},
  {name:'Justin Thomas',       odds:2500,  cost:8.5},
  {name:'Brooks Koepka',       odds:3300,  cost:7.5},
  {name:'Viktor Hovland',      odds:3500,  cost:7.5},
  {name:'Tyrrell Hatton',      odds:3500,  cost:7.5},
  {name:'Justin Rose',         odds:3500,  cost:7.5},
  {name:'Joaquin Niemann',     odds:3500,  cost:7.5},
  {name:'Chris Gotterup',      odds:4000,  cost:7.0},
  {name:'Patrick Reed',        odds:4000,  cost:7.0},
  {name:'Hideki Matsuyama',    odds:4000,  cost:7.0},
  {name:'Patrick Cantlay',     odds:4500,  cost:6.5},
  {name:'Matt Fitzpatrick',    odds:4500,  cost:6.5},
  {name:'Ben Griffin',         odds:5000,  cost:6.0},
  {name:'Jordan Spieth',       odds:5000,  cost:6.0},
  {name:'Shane Lowry',         odds:6000,  cost:5.5},
  {name:'Corey Conners',       odds:6000,  cost:5.5},
  {name:'Robert MacIntyre',    odds:6600,  cost:5.0},
  {name:'Sungjae Im',          odds:7000,  cost:5.0},
  {name:'Sepp Straka',         odds:7000,  cost:5.0},
  {name:'Russell Henley',      odds:7000,  cost:5.0},
  {name:'Wyndham Clark',       odds:8000,  cost:4.5},
  {name:'Tony Finau',          odds:8000,  cost:4.5},
  {name:'Si Woo Kim',          odds:8000,  cost:4.5},
  {name:'Sam Burns',           odds:8000,  cost:4.5},
  {name:'Maverick McNealy',    odds:8000,  cost:4.5},
  {name:'Jason Day',           odds:8000,  cost:4.5},
  {name:'Jake Knapp',          odds:8000,  cost:4.5},
  {name:'J.J. Spaun',         odds:8000,  cost:4.5},
  {name:'Harris English',      odds:8000,  cost:4.5},
  {name:'Daniel Berger',       odds:8000,  cost:4.5},
  {name:'Min Woo Lee',         odds:9000,  cost:4.5},
  {name:'Max Homa',            odds:9000,  cost:4.5},
  {name:'Cameron Smith',       odds:10000, cost:4.0},
  {name:'Jacob Bridgeman',     odds:10000, cost:4.0},
  {name:'David Puig',          odds:10000, cost:4.0},
  {name:'Will Zalatoris',      odds:11000, cost:3.5},
  {name:'Keegan Bradley',      odds:11000, cost:3.5},
  {name:'Byeong Hun An',       odds:12000, cost:3.5},
  {name:'Akshay Bhatia',       odds:12000, cost:3.5},
  {name:'Adam Scott',          odds:12000, cost:3.5},
  {name:'Dean Burmester',      odds:12000, cost:3.5},
  {name:'Aaron Rai',           odds:13000, cost:3.0},
  {name:'Sahith Theegala',     odds:13000, cost:3.0},
  {name:'Dustin Johnson',      odds:13000, cost:3.0},
  {name:'Taylor Pendrith',     odds:14000, cost:3.0},
  {name:'Sergio García',       odds:14000, cost:3.0},
  {name:'Ryan Gerard',         odds:14000, cost:3.0},
  {name:'Gary Woodland',       odds:14000, cost:3.0},
  {name:'Brian Harman',        odds:15000, cost:2.5},
  {name:'Tom Kim',             odds:15000, cost:2.5},
  {name:'Alex Noren',          odds:15000, cost:2.5},
  {name:'Rasmus Højgaard',     odds:15000, cost:2.5},
  {name:'Nicolai Højgaard',    odds:15000, cost:2.5},
  {name:'Michael Kim',         odds:15000, cost:2.5},
  {name:'Keith Mitchell',      odds:15000, cost:2.5},
  {name:'J.T. Poston',        odds:15000, cost:2.5},
  {name:'Harry Hall',          odds:15000, cost:2.5},
  {name:'Denny McCarthy',      odds:15000, cost:2.5},
  {name:'Rickie Fowler',       odds:17000, cost:2.0},
  {name:'Davis Thompson',      odds:17000, cost:2.0},
  {name:'Andrew Novak',        odds:18000, cost:2.0},
  {name:'Bud Cauley',          odds:20000, cost:1.0},
  {name:'Billy Horschel',      odds:20000, cost:1.0},
  {name:'Thomas Detry',        odds:20000, cost:1.0},
  {name:'Taylor Moore',        odds:20000, cost:1.0},
  {name:'Stephan Jaeger',      odds:20000, cost:1.0},
  {name:'Samuel Stevens',      odds:20000, cost:1.0},
];

let picks = []; // array of player names
let searchQuery = '';

function spent() { return picks.reduce((s,n)=>{ const p=PLAYERS.find(x=>x.name===n); return s+(p?p.cost:0); },0); }
function remaining() { return BUDGET - spent(); }
function fmtOdds(o) { return `+${o.toLocaleString()}`; }
function fmtCost(c) { return c.toFixed(1); }

function updateBudget() {
  const s = spent();
  const rem = BUDGET - s;
  const pct = (s / BUDGET) * 100;
  const fill = document.getElementById('budget-fill');
  const nums = document.getElementById('budget-nums');
  fill.style.width = Math.min(pct, 100) + '%';
  fill.className = 'budget-fill' + (pct>90?' danger':pct>70?' warning':'');
  nums.textContent = `£${fmtCost(rem)}m left`;
  nums.className = 'budget-nums' + (rem < 0 ? ' danger' : '');
}

function updateSlots() {
  for(let i=0;i<5;i++){
    const slot = document.getElementById('slot-'+i);
    const name = picks[i];
    if(name){
      const p = PLAYERS.find(x=>x.name===name);
      const short = name.split(' ').pop();
      slot.className = 'slot filled';
      slot.innerHTML = `<span class="slot-name">${short}</span><span class="slot-cost">£${fmtCost(p.cost)}m</span>`;
      slot.onclick = () => removePick(name);
    } else {
      slot.className = 'slot';
      slot.innerHTML = '<span class="slot-empty">+</span>';
      slot.onclick = null;
    }
  }
}

function updateSubmit() {
  const btn = document.getElementById('submit-btn');
  const rem = remaining();
  if(picks.length === MAX_PICKS && rem >= 0) {
    btn.disabled = false;
    btn.className = 'submit-btn ready';
    btn.textContent = `Confirm team · £${fmtCost(spent())}m spent →`;
  } else if(picks.length < MAX_PICKS) {
    btn.disabled = true;
    btn.className = 'submit-btn';
    btn.textContent = `Select ${MAX_PICKS - picks.length} more player${MAX_PICKS-picks.length===1?'':'s'} to continue →`;
  } else {
    btn.disabled = true;
    btn.className = 'submit-btn';
    btn.textContent = `Over budget by £${fmtCost(-rem)}m`;
  }
}

function togglePick(name) {
  const p = PLAYERS.find(x=>x.name===name);
  if(picks.includes(name)){
    removePick(name);
    return;
  }
  if(picks.length >= MAX_PICKS){ showToast('Remove a player first'); return; }
  if(remaining() < p.cost){ showToast(`Not enough budget (need £${fmtCost(p.cost)}m)`); return; }
  picks.push(name);
  updateBudget(); updateSlots(); updateSubmit(); render();
}

function removePick(name) {
  picks = picks.filter(n=>n!==name);
  updateBudget(); updateSlots(); updateSubmit(); render();
}

function render() {
  const q = searchQuery.toLowerCase();
  let list = [...PLAYERS];
  if(q) list = list.filter(p=>p.name.toLowerCase().includes(q));
  const rem = remaining();
  let html = '';

  // Group: selected first, then affordable, then too expensive
  const selected = list.filter(p=>picks.includes(p.name));
  const affordable = list.filter(p=>!picks.includes(p.name) && p.cost<=rem);
  const tooExp = list.filter(p=>!picks.includes(p.name) && p.cost>rem);

  function row(p, disabled=false) {
    const sel = picks.includes(p.name);
    const cls = sel?'player-row selected':disabled?'player-row disabled':'player-row';
    const action = sel
      ? `<div class="tick"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>`
      : `<div class="add-btn"><svg viewBox="0 0 12 12"><line x1="6" y1="2" x2="6" y2="10"/><line x1="2" y1="6" x2="10" y2="6"/></svg></div>`;
    return `<div class="${cls}" data-name="${p.name}" data-disabled="${disabled}">
      <div>
        <div class="player-name">${p.name}</div>

      </div>
      <div class="player-cost">£${fmtCost(p.cost)}<span class="cost-unit">m</span></div>
      ${action}
    </div>`;
  }

  if(selected.length && !q){
    html += `<div class="section-hd">✓ Selected</div>`;
    selected.forEach(p=>html+=row(p));
  }
  if(affordable.length){
    if(selected.length && !q) html += `<div class="section-hd">Available</div>`;
    affordable.forEach(p=>html+=row(p));
  }
  if(tooExp.length && picks.length < MAX_PICKS){
    html += `<div class="section-hd">Over budget</div>`;
    tooExp.forEach(p=>html+=row(p, true));
  }

  document.getElementById('player-list').innerHTML = html || '<div style="padding:20px;text-align:center;color:#999;font-size:13px">No players found</div>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.className='toast', 2200);
}

function submitTeam() {
  if(picks.length !== MAX_PICKS || remaining() < 0) return;
  const total = spent();
  alert(`Team confirmed!\n\n${picks.map((n,i)=>{const p=PLAYERS.find(x=>x.name===n);return `${i+1}. ${n} — £${fmtCost(p.cost)}m`;}).join('\n')}\n\nTotal: £${fmtCost(total)}m`);
}

document.getElementById('search').addEventListener('input', e=>{
  searchQuery = e.target.value;
  render();
});

// Event delegation for player rows
document.getElementById('player-list').addEventListener('click', e=>{
  const row = e.target.closest('[data-name]');
  if(!row) return;
  if(row.dataset.disabled === 'true') return;
  togglePick(row.dataset.name);
});

// Init
updateBudget(); updateSlots(); updateSubmit(); render();
</script>
</body>
</html>
